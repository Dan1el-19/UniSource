name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/unisource-sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: frontend-worker-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    name: Deploy
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Switch SDK dependency to npm
        run: pnpm -w run sdk:deps:npm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --config.link-workspace-packages=false

      - name: Typecheck frontend
        run: pnpm --filter ./apps/frontend typecheck

      - name: Build frontend
        run: pnpm --filter ./apps/frontend build

      - name: Generate Wrangler config
        run: pnpm --filter frontend generate:wrangler
        env:
          WORKER_NAME: ${{ secrets.FRONTEND_WORKER_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FRONTEND_ROUTE_PATTERN: ${{ secrets.FRONTEND_ROUTE_PATTERN }}
          FRONTEND_ROUTE_ZONE_NAME: ${{ secrets.FRONTEND_ROUTE_ZONE_NAME }}

      - name: Deploy frontend Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          workingDirectory: apps/frontend
          command: deploy --config wrangler.generated.jsonc
          wranglerVersion: "4"
