name: Release SDK Beta

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Type of beta bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - next

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6.0.5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify SDK
        run: pnpm --filter @unisource/sdk typecheck && pnpm --filter @unisource/sdk test

      - name: Bump prerelease version
        id: bump
        run: |
          NEW_VERSION=$(node scripts/bump-sdk-prerelease.mjs ${{ inputs.bump }})
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build SDK
        run: pnpm --filter @unisource/sdk build

      - name: Publish to npm beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/unisource-sdk
          npm publish --tag beta --provenance --access public

      - name: Commit version bump and tag
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/unisource-sdk/package.json
          git commit -m "chore(sdk): release beta ${{ steps.bump.outputs.version }}"
          git tag "sdk-v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main --tags
