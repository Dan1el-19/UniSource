name: Release SDK

on:
  push:
    branches:
      - main
    paths:
      - 'packages/unisource-sdk/**'
      - '.changeset/**'
  workflow_dispatch:

concurrency:
  group: release-sdk
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify SDK
        run: pnpm --filter @unisource/sdk typecheck && pnpm --filter @unisource/sdk test

      - name: Publish or open Version PR
        uses: changesets/action@v1
        with:
          publish: pnpm run changeset:publish
          version: pnpm run changeset:version
          commit: "chore(sdk): version packages"
          title: "chore(sdk): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
