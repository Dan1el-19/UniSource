name: Deploy Backend

on:
  release:
    types:
      - published

concurrency:
  group: workers-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: ${{ github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'backend@') }}
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Switch app SDK dependency source to npm
        run: pnpm -w run sdk:deps:npm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --config.link-workspace-packages=false

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          workingDirectory: apps/backend
          command: d1 migrations apply usrc-d1 --remote
          wranglerVersion: 4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          workingDirectory: apps/backend
          command: deploy --minify
          wranglerVersion: 4
